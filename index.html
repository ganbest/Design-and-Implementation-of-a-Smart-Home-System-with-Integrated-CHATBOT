<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Home Pro AI - Login</title>
    <link rel="icon" type="image/png" href="logoh.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Phông chữ bo tròn Quicksand -->
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <style>
        :root {
            /* Light Mode Variables */
            --bg-gradient: linear-gradient(120deg, #dbeafe 0%, #bfdbfe 100%);
            --card-bg: rgba(255, 255, 255, 0.98);
            --text-main: #1e293b;
            --text-sub: #64748b;
            --input-bg: #f8fafc;
            --input-border: #f1f5f9;
            --primary-blue: #2563eb;
            --primary-gradient: linear-gradient(135deg, #3b82f6 0%, #1e3a8a 100%);
            --card-shadow: 0 20px 50px rgba(37, 99, 235, 0.15);
        }

        /* Dark Mode Variables */
        [data-theme="dark"] {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            --card-bg: rgba(30, 41, 59, 0.95);
            --text-main: #f8fafc;
            --text-sub: #94a3b8;
            --input-bg: #0f172a;
            --input-border: #334155;
            --primary-blue: #60a5fa;
            --primary-gradient: linear-gradient(135deg, #2563eb 0%, #7c3aed 100%);
            --card-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        }

        body { 
            height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            background: var(--bg-gradient);
            font-family: 'Quicksand', sans-serif;
            margin: 0;
            overflow: hidden;
            position: relative;
            transition: all 0.5s ease;
        }

        .bg-circle {
            position: absolute;
            border-radius: 50%;
            background: rgba(37, 99, 235, 0.08);
            z-index: -1;
        }
        .circle-1 { width: 350px; height: 350px; top: -100px; left: -80px; }
        .circle-2 { width: 250px; height: 250px; bottom: -80px; right: -40px; }

        /* Theme Toggle Switch */
        .theme-switch-wrapper {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            z-index: 10;
        }

        .theme-switch {
            display: inline-block;
            height: 28px;
            position: relative;
            width: 50px;
        }

        .theme-switch input { display: none; }

        .slider {
            background-color: #cbd5e1;
            bottom: 0;
            cursor: pointer;
            left: 0;
            position: absolute;
            right: 0;
            top: 0;
            transition: .4s;
            border-radius: 34px;
        }

        .slider:before {
            background-color: #fff;
            bottom: 4px;
            content: "";
            height: 20px;
            left: 4px;
            position: absolute;
            transition: .4s;
            width: 20px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: "Font Awesome 6 Free";
            font-weight: 900;
            font-size: 12px;
            color: #f59e0b;
        }

        input:checked + .slider { background-color: var(--primary-blue); }
        input:checked + .slider:before {
            transform: translateX(22px);
            color: #1e293b;
        }

        .login-container {
            width: 100%;
            max-width: 400px;
            padding: 15px;
            z-index: 1;
        }

        .auth-card { 
            background: var(--card-bg);
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: var(--card-shadow);
            padding: 30px 25px;
            text-align: center;
            backdrop-filter: blur(10px);
            transition: background 0.5s ease;
        }

        .brand-header {
            display: flex;
            flex-direction: column; 
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 20px;
        }

        .brand-icon-wrapper {
            width: 55px;
            height: 55px;
            background: rgba(37, 99, 235, 0.1);
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.05);
        }

        .brand-icon {
            width: 60px !important;  /* Thêm !important để chắc chắn nó nhận */
            height: 60px !important;
            display: block !important;
            object-fit: contain;
            border-radius: 50%;
        }

        .brand-name {
            font-size: 1.3rem;
            font-weight: 800;
            color: var(--text-main);
            letter-spacing: 1px; 
            text-transform: uppercase;
        }

        .brand-name span { color: var(--primary-blue); }

        .welcome-text {
            color: var(--text-sub);
            font-size: 0.85rem;
            margin-bottom: 25px;
            font-weight: 500;
        }

        .form-floating { margin-bottom: 12px; }

        .form-control {
            border-radius: 15px;
            border: 2px solid var(--input-border);
            padding: 10px 15px;
            height: 54px;
            background-color: var(--input-bg);
            font-weight: 600;
            font-size: 0.95rem;
            color: var(--text-main);
        }

        .form-control:focus {
            background-color: var(--input-bg);
            border-color: var(--primary-blue);
            color: var(--text-main);
            box-shadow: none;
        }

        .form-floating label { color: var(--text-sub); }

        .btn-login {
            background: var(--primary-gradient);
            color: white;
            border: none;
            border-radius: 15px;
            padding: 14px;
            font-weight: 700;
            width: 100%;
            margin-top: 10px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
            font-size: 1rem;
            letter-spacing: 0.5px;
            transition: all 0.3s;
        }

        .btn-login:hover { transform: translateY(-2px); opacity: 0.9; }

        .toggle-mode {
            margin-top: 20px;
            font-size: 0.9rem;
            color: var(--text-sub);
            font-weight: 500;
        }

        .toggle-mode a {
            color: var(--primary-blue);
            text-decoration: none;
            font-weight: 700;
        }

        #message {
            margin-top: 15px;
            border-radius: 12px;
            font-size: 0.85rem;
            display: none;
            font-weight: 600;
            padding: 10px;
        }

        .loader {
            display: none;
            width: 18px;
            height: 18px;
            border: 3px solid #FFF;
            border-bottom-color: transparent;
            border-radius: 50%;
            animation: rotation 1s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes rotation {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

/* =======================================================
   LOGIN MOBILE 3.5 INCH
======================================================= */

@media screen and (max-width:480px) and (max-height:320px){

    *{
        box-sizing:border-box;
    }

    html,
    body{

        width:100%;
        height:100%;

        margin:0;
        padding:0;

        overflow-x:hidden;
        overflow-y:auto;
    }

    body{

        background:var(--bg-gradient);
        min-height:100vh;
        display:flex;
        align-items:center;
        justify-content:center;
    }

    /* ===================================================
       BG
    =================================================== */

    .circle-1{

        width:160px;
        height:160px;

        top:-50px;
        left:-40px;
    }

    .circle-2{

        width:120px;
        height:120px;

        bottom:-40px;
        right:-30px;
    }

    /* ===================================================
       SWITCH
    =================================================== */

    .theme-switch-wrapper{

        top:4px;
        right:4px;

        transform:scale(0.65);
    }

    /* ===================================================
       LOGIN CONTAINER
    =================================================== */

    .login-container{

        width:100%;

        max-width:300px;

        padding:6px;
        margin:auto;
    }
    /* SCROLL MƯỢT */

    .login-container::-webkit-scrollbar{
    width:0;
    }

    /* ===================================================
       CARD
    =================================================== */

    .auth-card{

        width:100%;

        padding:12px 14px;

        border-radius:18px;

        overflow:visible !important;

        min-height:auto !important;

        box-shadow:0 10px 25px rgba(0,0,0,0.12);
    }

    /* ===================================================
       BRAND
    =================================================== */

    .brand-header{

        gap:4px;

        margin-top:0;

        padding-top:0;

        margin-bottom:8px;
    }

    .brand-icon-wrapper{

        width:30px;
        height:30px;

        border-radius:8px;

        margin-top:0 !important;
    }

    .brand-icon{

        width:28px !important;
        height:28px !important;

        object-fit:contain;
    }

    .brand-name{

        font-size:0.82rem;

        line-height:1.1;

        letter-spacing:0.3px;

        margin-bottom:2px;
    }

    .welcome-text{

        font-size:0.58rem;

        margin-bottom:8px;
    }

    /* ===================================================
       INPUT
    =================================================== */

    .form-floating{

        margin-bottom:6px;
    }

    .form-control{

        height:36px;

        min-height:36px;

        border-radius:10px;

        font-size:0.72rem;

        padding:6px 10px;
    }

    .form-floating label{

        font-size:0.62rem;
    }

    /* ===================================================
       BUTTON
    =================================================== */

    .btn-login{

        height:36px;

        min-height:36px;

        border-radius:10px;

        font-size:0.72rem;

        margin-top:2px;

        padding:0;
    }

    /* ===================================================
       TOGGLE
    =================================================== */

    .toggle-mode{

        margin-top:8px;

        font-size:0.6rem;
    }

    /* ===================================================
       MESSAGE
    =================================================== */

    #message{

        font-size:0.62rem;

        padding:6px;
    }

    /* ===================================================
       SCROLLBAR
    =================================================== */

    html::-webkit-scrollbar,
    body::-webkit-scrollbar{
        display:none;
    }
}
    </style>
</head>
<body data-theme="light">

    <!-- Theme Switcher UI -->
    <div class="theme-switch-wrapper">
        <i class="fas fa-sun" style="color: #f59e0b; font-size: 14px;"></i>
        <label class="theme-switch" for="checkbox">
            <input type="checkbox" id="checkbox" />
            <div class="slider"></div>
        </label>
        <i class="fas fa-moon" style="color: #94a3b8; font-size: 14px;"></i>
    </div>

    <div class="bg-circle circle-1"></div>
    <div class="bg-circle circle-2"></div>

    <div class="login-container">
        <div class="auth-card">
            <div class="brand-header">
                <div class="brand-icon-wrapper">
                    <img src="logoh.png" class="brand-icon" alt="Logo">
                </div>
                <div class="brand-name">SMART HOME <span>PRO AI</span></div>
            </div>
            
            <p class="welcome-text" id="authSubtitle">Hệ thống điều khiển nhà thông minh</p>

            <div id="usernameGroup" style="display: none;">
                <div class="form-floating mb-2">
                    <input type="text" id="username" class="form-control" placeholder="Tên của bạn">
                    <label for="username">Tên người dùng</label>
                </div>
            </div>

            <div class="form-floating mb-2">
                <input type="email" id="email" class="form-control" placeholder="name@example.com">
                <label for="email">Địa chỉ Email</label>
            </div>

            <div class="form-floating mb-3">
                <input type="password" id="password" class="form-control" placeholder="Password">
                <label for="password">Mật khẩu</label>
            </div>

            <button id="mainBtn" class="btn-login" onclick="handleAuth()">
                <span class="loader" id="authLoader"></span>
                <span id="btnText">ĐĂNG NHẬP</span>
            </button>
            
            <div id="message" class="alert"></div>

            <div class="toggle-mode">
                <span id="toggleText">Chưa có tài khoản?</span> 
                <a href="javascript:void(0)" onclick="toggleMode()" id="toggleLink">Đăng ký ngay</a>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBYDsxWL0CgM22vuTqO4pN-MBaVAbAoq58",
            authDomain: "smart-home-dd3cf.firebaseapp.com",
            projectId: "smart-home-dd3cf",
            databaseURL: "https://smart-home-dd3cf-default-rtdb.firebaseio.com"
        };
        
        firebase.initializeApp(firebaseConfig);

        // --- THEME LOGIC ---
        const toggleSwitch = document.querySelector('.theme-switch input[type="checkbox"]');
        
        function setTheme(theme) {
            document.body.setAttribute('data-theme', theme);
            toggleSwitch.checked = (theme === 'dark');
            localStorage.setItem('theme', theme);
        }

        // Tự động kiểm tra thời gian
        function checkAutoTheme() {
            const hour = new Date().getHours();
            // Nếu người dùng chưa từng tự tay chỉnh (manual override), thì mới chạy tự động
            if (!localStorage.getItem('manualTheme')) {
                if (hour >= 6 && hour < 18) {
                    setTheme('light');
                } else {
                    setTheme('dark');
                }
            } else {
                // Nếu đã chỉnh tay, lấy giá trị đã lưu
                setTheme(localStorage.getItem('theme'));
            }
        }

        // Lắng nghe sự kiện gạt thanh thủ công
        toggleSwitch.addEventListener('change', (e) => {
            localStorage.setItem('manualTheme', 'true'); // Đánh dấu là người dùng đã tự chỉnh
            if (e.target.checked) {
                setTheme('dark');
            } else {
                setTheme('light');
            }
        });

        // Khởi chạy kiểm tra theme khi load trang
        checkAutoTheme();

        // --- AUTH LOGIC ---
        let isLoginMode = true;

        function toggleMode() {
            isLoginMode = !isLoginMode;
            const subtitle = document.getElementById('authSubtitle');
            const btnText = document.getElementById('btnText');
            const toggleText = document.getElementById('toggleText');
            const toggleLink = document.getElementById('toggleLink');
            const userGroup = document.getElementById('usernameGroup');

            resetUIState();

            if (isLoginMode) {
                subtitle.innerText = "Hệ thống điều khiển nhà thông minh";
                btnText.innerText = "ĐĂNG NHẬP";
                toggleText.innerText = "Chưa có tài khoản?";
                toggleLink.innerText = "Đăng ký ngay";
                userGroup.style.display = "none";
            } else {
                subtitle.innerText = "Tham gia cộng đồng Smart Home";
                btnText.innerText = "TẠO TÀI KHOẢN";
                toggleText.innerText = "Đã có tài khoản?";
                toggleLink.innerText = "Đăng nhập ngay";
                userGroup.style.display = "block";
            }
        }

        function resetUIState() {
            const loader = document.getElementById('authLoader');
            const btn = document.getElementById('mainBtn');
            const msg = document.getElementById('message');
            loader.style.display = "none";
            btn.disabled = false;
            msg.style.display = 'none';
        }

        function handleAuth() {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            const nameInput = document.getElementById('username').value;
            const loader = document.getElementById('authLoader');
            const btn = document.getElementById('mainBtn');

            if(!email || !pass) {
                showMessage("Vui lòng điền đủ thông tin!", "danger");
                return;
            }

            loader.style.display = "inline-block";
            btn.disabled = true;

            firebase.auth().setPersistence(firebase.auth.Auth.Persistence.LOCAL)
                .then(() => {
                    if (isLoginMode) {
                        return firebase.auth().signInWithEmailAndPassword(email, pass);
                    } else {
                        if(!nameInput) throw new Error("Vui lòng nhập tên");
                        return firebase.auth().createUserWithEmailAndPassword(email, pass)
                            .then((result) => {
                                return result.user.updateProfile({ displayName: nameInput });
                            });
                    }
                })
                .then(() => {
                    const user = firebase.auth().currentUser;
                    localStorage.setItem('smartHomeUser', user.displayName || user.email.split('@')[0]);
                    showMessage("Thành công! Đang vào hệ thống...", 'success');
                    setTimeout(() => { window.location.href = "./dashboard.html"; }, 800);
                })
                .catch(err => {
                    loader.style.display = "none";
                    btn.disabled = false;
                    let errorMsg = "Lỗi xác thực!";
                    if (err.code === 'auth/user-not-found') errorMsg = "Email chưa được đăng ký!";
                    else if (err.code === 'auth/wrong-password') errorMsg = "Mật khẩu không đúng!";
                    else if (err.code === 'auth/email-already-in-use') errorMsg = "Email này đã tồn tại!";
                    else if (err.code === 'auth/invalid-email') errorMsg = "Email không hợp lệ!";
                    else if (err.code === 'auth/weak-password') errorMsg = "Mật khẩu quá ngắn!";
                    else errorMsg = err.message;
                    showMessage(errorMsg, 'danger');
                });
        }

        function showMessage(text, type) {
            const msg = document.getElementById('message');
            msg.innerText = text;
            msg.className = `alert alert-${type} mt-2`;
            msg.style.display = 'block';
        }
    </script>
</body>
</html>
